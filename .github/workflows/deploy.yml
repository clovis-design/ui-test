name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branche'
        required: true
        default: 'develop'

      environment:
        description: 'Environnement'
        required: true
        type: choice
        options:
          - dev1
          - dev2
          - recette

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/clovis-design/frontend-angular:${{ inputs.environment }}

      - name: Deploy DEV1
        if: ${{ inputs.environment == 'dev1' }}
        run: curl -X POST "${{ secrets.RENDER_DEV1_HOOK }}"

      - name: Deploy DEV2
        if: ${{ inputs.environment == 'dev2' }}
        run: curl -X POST "${{ secrets.RENDER_DEV2_HOOK }}"

      - name: Deploy RECETTE
        if: ${{ inputs.environment == 'recette' }}
        run: curl -X POST "${{ secrets.RENDER_RECETTE_HOOK }}"